# Full production-like monitoring stack for bravyr-obs.
#
# Grafana:      http://localhost:3000
# Prometheus:   (internal only, queried through Grafana)
# OTel gRPC:    localhost:4317  (no browser UI)
# Tempo:        (internal only, queried through Grafana)
# Loki:         (internal only, queried through Grafana)
#
# Before starting: cp .env.example .env and fill in real values.

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  tempo_data:
  grafana_data:
  loki_data:
  alloy_data:

services:

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP gRPC, fans out to Tempo + Prometheus
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: bravyr_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver (loopback only)
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver (loopback only)
    networks:
      - monitoring
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Tempo — distributed trace storage (receives OTLP from OTel Collector)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.10.3
    container_name: bravyr_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping and storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: bravyr_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend (receives logs from Alloy)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.7.1
    container_name: bravyr_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Alloy — log collector (replaces Promtail, which is EOL since March 2026)
  # Scrapes Docker container stdout and ships to Loki.
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.14.0
    container_name: bravyr_alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Grafana — dashboards wired to Prometheus, Tempo, and Loki
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.4.2
    container_name: bravyr_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI (loopback only)
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
