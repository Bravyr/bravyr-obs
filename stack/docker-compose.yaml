# Full production-like monitoring stack for bravyr-obs.
#
# Grafana:      http://localhost:3000
# Prometheus:   (internal only, queried through Grafana)
# OTel gRPC:    localhost:4317  (no browser UI)
# Tempo:        (internal only, queried through Grafana)
# Loki:         (internal only, queried through Grafana)
#
# Before starting: cp .env.example .env and fill in real values.

networks:
  monitoring:
    driver: bridge
  # External network shared with socialup-api's Coolify project. Prometheus
  # needs to be on it (in addition to the local `monitoring` bridge below)
  # to reach the socialup-postgres-exporter / socialup-node-exporter scrape
  # targets in stack/prometheus/prometheus.yml -- those containers live in
  # a different Coolify project and are otherwise unreachable from this
  # stack's bridge network, which would leave every alert in
  # rules-pgbackrest.yaml / rules-node-disk.yaml permanently in NoData.
  # Coolify creates this network; it must already exist before this stack
  # deploys (same pattern socialup-api's own stacks use for the same
  # network).
  coolify:
    external: true

volumes:
  prometheus_data:
  tempo_data:
  grafana_data:
  loki_data:
  alloy_data:

services:

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP gRPC, fans out to Tempo + Prometheus
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: bravyr_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver (loopback only)
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver (loopback only)
    networks:
      - monitoring
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Tempo — distributed trace storage (receives OTLP from OTel Collector)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.10.3
    container_name: bravyr_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping and storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: bravyr_prometheus
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "$INTERNAL_API_KEY" > /etc/prometheus/api_token
        exec prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle \
          --web.enable-remote-write-receiver \
          --enable-feature=exemplar-storage
    environment:
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      # ADDITIVE -- keeps the existing `monitoring` network above. Needed to
      # reach socialup-postgres-exporter:9187 / socialup-node-exporter:9100
      # (a different Coolify project's containers) and, pre-existing but
      # equally reliant on this same network attachment, api:8080 -- all
      # three scrape jobs in stack/prometheus/prometheus.yml assume
      # Prometheus is reachable on the shared `coolify` network. Without
      # this, every alert depending on those targets sits in NoData
      # regardless of what's happening in the target services themselves.
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend (receives logs from Alloy)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.7.1
    container_name: bravyr_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Alloy — log collector + Faro Web SDK receiver.
  # Ships Docker stdout to Loki. Also receives browser telemetry on port
  # 12347 and fans out to Tempo + Loki. Public ingest at
  # https://obs.bravyr.com/collect is routed by Coolify exactly like Grafana:
  # set "Domains for alloy" = https://obs.bravyr.com:12347 in the Coolify UI and
  # Coolify owns the router, cert and network attachment. Auth, rate-limiting
  # and the payload cap are enforced natively by faro.receiver (see
  # alloy/config.alloy), not by hand-written Traefik middleware.
  #
  # We do NOT hand-write traefik.http.* router/service/middleware labels here:
  # raw labels conflict with Coolify's own generated router for the domain, and
  # in practice Traefik ended up with "no available server" (empty backend) and
  # a self-signed cert. Grafana works with only the network pin below, so Alloy
  # does too.
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.14.0
    container_name: bravyr_alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy", "--storage.path=/var/lib/alloy/data"]
    environment:
      FARO_ALLOWED_ORIGINS: "${FARO_ALLOWED_ORIGINS:?FARO_ALLOWED_ORIGINS must be set in .env}"
      # Consumed by faro.receiver's api_key (alloy/config.alloy). Must match the
      # gb-landing Worker's key. Required, so a missing value fails the deploy
      # rather than silently leaving the ingest unauthenticated.
      FARO_API_KEY: "${FARO_API_KEY:?FARO_API_KEY must be set in .env}"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      # Loopback-only so local smoke tests can curl the Faro receiver
      # without Traefik. Coolify deploys reach Alloy via the Docker
      # bridge (container name), so this mapping has no production effect.
      - "127.0.0.1:12347:12347"
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      # grafana/alloy ships neither wget nor curl (unlike the sibling Grafana
      # images, whose identical wget checks pass), so the previous wget probe
      # failed on every run -> Docker marked the container unhealthy -> Traefik
      # excludes unhealthy containers, dropping alloy from the obs.bravyr.com
      # load-balancer pool (503) and never provisioning its ACME cert for a
      # router it cannot serve. bash IS in the image: use its built-in /dev/tcp
      # to confirm the faro.receiver port -- the exact target Traefik routes to
      # -- is accepting connections. Must run via `bash`, not the default
      # /bin/sh (dash), which has no /dev/tcp.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/12347"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      # Match Grafana exactly: the ONLY Traefik label. Coolify generates the
      # router + cert for the "Domains for alloy" entry and pins this network so
      # Traefik resolves Alloy on a routable IP. Everything else (auth, rate
      # limit, body cap) is enforced by faro.receiver in alloy/config.alloy.
      traefik.docker.network: "coolify"

  # ---------------------------------------------------------------------------
  # Grafana — dashboards wired to Prometheus, Tempo, and Loki
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.4.2
    container_name: bravyr_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL:-http://localhost:3000}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Consumed by grafana/provisioning/alerting/contact-points.yaml. Grafana
      # expands ${ALERT_WEBHOOK_URL} from its OWN process environment at
      # provisioning load time, so listing it in stack/.env is not enough --
      # that only exposes it to compose interpolation. Without this line the
      # webhook url provisions empty, Grafana rejects the contact point
      # ("required field 'url' is not specified"), provisioning fails fatally
      # and the container crash-loops, taking the whole stack down with it.
      # Required rather than defaulted: a contact point pointing at a dead URL
      # would make alert delivery fail silently, which is the exact failure
      # mode the noDataState/execErrState settings in rules-*.yaml exist to
      # avoid.
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:?ALERT_WEBHOOK_URL must be set in .env}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI (loopback only)
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      # Grafana attaches to multiple Docker networks under Coolify (coolify +
      # resource net + monitoring). Without this, Traefik may resolve Grafana
      # to a network IP it cannot route to -> 504 Gateway Timeout. Pin the
      # network Traefik must use to reach the container.
      traefik.docker.network: "coolify"
