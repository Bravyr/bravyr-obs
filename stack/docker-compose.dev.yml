# Lightweight dev stack — OTel Collector + Prometheus only.
# Tempo, Loki, and Grafana are excluded to keep startup fast.
# Use: docker compose -f docker-compose.dev.yml up
#
# Prometheus:   http://localhost:9090
# OTel gRPC:    localhost:4317
#
# In dev mode the Go service writes human-readable console output to stdout.
# No log backend is needed locally — use the terminal output directly.
#
# Go service env vars for local development:
#   OBS_OTLP_ENDPOINT=localhost:4317
#   OBS_DEV_MODE=true

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data_dev:

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: bravyr_otel_collector_dev
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: bravyr_prometheus_dev
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_dev:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
