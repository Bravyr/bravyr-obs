# ---------------------------------------------------------------------------
# Grafana alerting: alert rules (file provisioning, apiVersion 1).
#
# Host root-filesystem disk-usage guard (socialup-api issue #674 §10). Sits
# in its own file/folder ("Host Resources"), separate from
# rules-pgbackrest.yaml ("pgBackRest PITR"), because node_filesystem_* is a
# host-level concern, not specific to pgBackRest -- even though the reason
# node-exporter got deployed at all was to close this and the
# backup-freshness/stanza-check gaps together (see socialup-api
# docs/runbooks/postgres-restore.md "Alerting").
#
# Reuses the same "pgbackrest-oncall" contact point as rules-pgbackrest.yaml
# (contact-points.yaml) -- it's the only contact point that exists today;
# see notification-policies.yaml's comment on why a folder-specific route
# isn't needed yet (everything lands on the org-wide root policy).
#
# Metrics from node-exporter (coolify/stacks/node-exporter.yml, socialup-api,
# scrape job "socialup-node-exporter" in stack/prometheus/prometheus.yml).
# Datasource UID "prometheus" matches
# stack/grafana/provisioning/datasources/datasources.yaml.
#
# Targets mountpoint="/" (the host root filesystem) rather than a
# pgdata-specific mount: on this deployment's single-disk VPS (Hetzner Cloud
# VPS 30/20, no separate data disk documented -- see socialup-api
# docs/deployment-guide.md §1), every Docker named volume (including
# pgdata_dedicated) lives under /var/lib/docker on the same root filesystem,
# so "/" usage is a correct proxy for the actual disk-fill risk. This is an
# operational assumption about the current VPS layout, not something
# verified against live infrastructure from this repo -- revisit the
# mountpoint if a separate Docker data-root disk is ever added.
#
# fstype!="rootfs" excludes a synthetic duplicate "/" mount some kernels
# expose (the initramfs-era rootfs pseudo-filesystem) -- verified against
# node_exporter v1.12.1's default --collector.filesystem.fs-types-exclude
# regex, which does NOT include "rootfs" in its exclude list, so without
# this filter a query for mountpoint="/" could double-count or pick the
# wrong series.
#
# Both rules set noDataState: Alerting / execErrState: Alerting (Grafana's
# defaults, NoData/Error, do NOT page). A scrape outage here means disk
# usage is unmonitored -- that must page, not sit silently unevaluated, for
# the same reason rules-pgbackrest.yaml does this. Verified against this
# stack's Grafana version (grafana/grafana:12.4.2, stack/docker-compose.yaml)
# and the file-provisioning apiVersion 1 schema used here.
# ---------------------------------------------------------------------------
apiVersion: 1

groups:
  - orgId: 1
    name: node-disk-usage
    folder: Host Resources
    interval: 1m
    rules:
      - uid: host-root-disk-usage-warning
        title: HostRootDiskUsageWarning
        condition: B
        for: 10m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: warning
          team: pgbackrest
          service: socialup-host
        annotations:
          summary: "Host root filesystem is over 70% full"
          description: >-
            node_filesystem usage on the host root filesystem
            (mountpoint="/") has exceeded 70% for 10 minutes. Left
            unaddressed this eventually threatens pg_wal / pgdata (see
            socialup-api docs/runbooks/postgres-restore.md "Archive
            backlog"), even though this alert is host-wide, not
            Postgres-specific -- the box is shared with GoTeamUp, Temporal,
            api/worker, and observability.
          runbook_url: "https://github.com/Bravyr/socialup-api/blob/main/docs/runbooks/postgres-restore.md#5-alerting"
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: '100 * (1 - (node_filesystem_avail_bytes{job="socialup-node-exporter", mountpoint="/", fstype!="rootfs"} / node_filesystem_size_bytes{job="socialup-node-exporter", mountpoint="/", fstype!="rootfs"}))'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "__expr__"
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 70
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  type: query

      - uid: host-root-disk-usage-critical
        title: HostRootDiskUsageCritical
        condition: B
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
          team: pgbackrest
          service: socialup-host
        annotations:
          summary: "Host root filesystem is over 85% full"
          description: >-
            node_filesystem usage on the host root filesystem
            (mountpoint="/") has exceeded 85% for 5 minutes. This is the
            page-severity backstop from socialup-api#674 §10 item 1: left
            unaddressed, pg_wal filling the data volume hard-stops
            Postgres. Free up space or scale the disk immediately.
          runbook_url: "https://github.com/Bravyr/socialup-api/blob/main/docs/runbooks/postgres-restore.md#5-alerting"
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: '100 * (1 - (node_filesystem_avail_bytes{job="socialup-node-exporter", mountpoint="/", fstype!="rootfs"} / node_filesystem_size_bytes{job="socialup-node-exporter", mountpoint="/", fstype!="rootfs"}))'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: "__expr__"
            queryType: ""
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: classic_conditions
              datasource:
                type: __expr__
                uid: "__expr__"
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  type: query
