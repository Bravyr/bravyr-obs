# Full production-like monitoring stack for bravyr-obs.
#
# EULA REQUIREMENT: Seq requires ACCEPT_EULA=Y. By starting this stack you
# accept the Seq End-User License Agreement: https://datalust.co/doc/seq-eula
#
# Seq UI:       http://localhost:5341
# Grafana:      http://localhost:3000
# Prometheus:   (internal only, queried through Grafana)
# OTel gRPC:    localhost:4317  (no browser UI)
# Tempo:        (internal only, queried through Grafana)
#
# Before starting: cp .env.example .env and fill in real values.

networks:
  monitoring:
    driver: bridge

volumes:
  seq_data:
  prometheus_data:
  tempo_data:
  grafana_data:

services:

  # ---------------------------------------------------------------------------
  # Seq — structured log aggregation (CLEF HTTP ingestion)
  # ---------------------------------------------------------------------------
  seq:
    image: datalust/seq:2025.2
    container_name: bravyr_seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "127.0.0.1:5341:80"   # Seq UI + CLEF ingestion API (loopback only)
    volumes:
      - seq_data:/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP gRPC, fans out to Tempo + Prometheus
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: bravyr_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver (loopback only)
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver (loopback only)
    networks:
      - monitoring
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Tempo — distributed trace storage (receives OTLP from OTel Collector)
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.7.2
    container_name: bravyr_tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping and storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: bravyr_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # postgres-exporter — surfaces Postgres metrics to Prometheus
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: bravyr_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${POSTGRES_DSN:?POSTGRES_DSN must be set}"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics | grep -q postgres_up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Grafana — dashboards wired to Prometheus, Tempo, and Seq
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.1
    container_name: bravyr_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "datalust-seq-datasource"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"   # Grafana UI (loopback only)
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      seq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
