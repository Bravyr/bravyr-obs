global:
  scrape_interval: 15s       # How frequently to scrape targets
  evaluation_interval: 15s   # How frequently to evaluate rules
  scrape_timeout: 10s

  # Labels added to every time series scraped by this Prometheus instance.
  # Useful when federating multiple Prometheus instances into a central store.
  external_labels:
    cluster: "local"
    env: "development"

# ---------------------------------------------------------------------------
# Scrape configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics
  # The collector exposes its own health/performance metrics on port 8888.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # ---------------------------------------------------------------------------
  # Exporters (postgres-exporter, redis-exporter, node-exporter) should live
  # alongside their parent services, not in this stack. Add their scrape
  # targets here once they are running. Example:
  #
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["host.docker.internal:9187"]
  #
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["host.docker.internal:9121"]
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Go services — update targets to match your Coolify container names or
  # Docker Compose service names on the shared network.
  #
  # On Coolify with "Connect To Predefined Network" enabled, services in
  # other compose stacks are reachable by their Docker Compose service name
  # on the shared coolify network (e.g., "api:8080").
  #
  # For local dev with Docker Desktop, use host.docker.internal:PORT.
  # ---------------------------------------------------------------------------
  - job_name: "socialup-api"
    metrics_path: "/metrics"
    bearer_token_file: /etc/prometheus/api_token
    static_configs:
      - targets:
          - "api:8080"
        labels:
          service: "socialup-api"

  # ---------------------------------------------------------------------------
  # Template for adding additional services:
  #
  # - job_name: "my-other-service"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets:
  #         - "worker:8081"
  #       labels:
  #         service: "my-other-service"
  # ---------------------------------------------------------------------------
