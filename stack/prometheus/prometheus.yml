global:
  scrape_interval: 15s       # How frequently to scrape targets
  evaluation_interval: 15s   # How frequently to evaluate rules
  scrape_timeout: 10s

  # Labels added to every time series scraped by this Prometheus instance.
  # Useful when federating multiple Prometheus instances into a central store.
  external_labels:
    cluster: "local"
    env: "development"

# ---------------------------------------------------------------------------
# Scrape configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics
  # The collector exposes its own health/performance metrics on port 8888.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # ---------------------------------------------------------------------------
  # socialup-api postgres-exporter (coolify/stacks/pgbouncer.yml). On Coolify
  # with "Connect To Predefined Network" enabled, reachable by container name
  # on the shared coolify network. Exposes pg_stat_archiver_* (via a custom
  # queries.yaml -- see that stack for details) plus postgres-exporter's
  # default collectors. Alert rules consuming pg_stat_archiver_* live in
  # stack/grafana/provisioning/alerting/rules-pgbackrest.yaml.
  # ---------------------------------------------------------------------------
  - job_name: "socialup-postgres-exporter"
    static_configs:
      - targets:
          - "socialup-postgres-exporter:9187"
        labels:
          service: "socialup-postgres"

  # ---------------------------------------------------------------------------
  # socialup-api node-exporter (coolify/stacks/node-exporter.yml,
  # container_name: socialup-node-exporter). On Coolify with "Connect To
  # Predefined Network" enabled, reachable by container name on the shared
  # coolify network. Exposes standard node-exporter host metrics
  # (node_filesystem_*, node_cpu_*, node_memory_*, ...) plus the
  # pgBackRest textfile-collector metrics written by
  # config/postgres/pgbackrest-textfile.sh (pgbackrest_*) via
  # --collector.textfile.directory. Closes the disk-usage and
  # backup-freshness/stanza-check alerting gaps documented in socialup-api
  # docs/runbooks/postgres-restore.md "Alerting". Alert rules consuming
  # node_filesystem_* live in
  # stack/grafana/provisioning/alerting/rules-node-disk.yaml; rules
  # consuming pgbackrest_* are appended to
  # stack/grafana/provisioning/alerting/rules-pgbackrest.yaml (group
  # pgbackrest-backup-health).
  # ---------------------------------------------------------------------------
  - job_name: "socialup-node-exporter"
    static_configs:
      - targets:
          - "socialup-node-exporter:9100"
        labels:
          service: "socialup-host"

  # ---------------------------------------------------------------------------
  # redis-exporter: not wired here yet.
  #
  # redis-exporter (coolify/stacks/pgbouncer.yml, socialup-redis-exporter)
  # is deployed but has no alert rules depending on it yet -- add a
  # "redis" job (targets: ["socialup-redis-exporter:9121"]) when needed.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Go services — update targets to match your Coolify container names or
  # Docker Compose service names on the shared network.
  #
  # On Coolify with "Connect To Predefined Network" enabled, services in
  # other compose stacks are reachable by their Docker Compose service name
  # on the shared coolify network (e.g., "api:8080").
  #
  # For local dev with Docker Desktop, use host.docker.internal:PORT.
  # ---------------------------------------------------------------------------
  - job_name: "socialup-api"
    metrics_path: "/metrics"
    bearer_token_file: /etc/prometheus/api_token
    static_configs:
      - targets:
          - "api:8080"
        labels:
          service: "socialup-api"

  # ---------------------------------------------------------------------------
  # Template for adding additional services:
  #
  # - job_name: "my-other-service"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets:
  #         - "worker:8081"
  #       labels:
  #         service: "my-other-service"
  # ---------------------------------------------------------------------------
